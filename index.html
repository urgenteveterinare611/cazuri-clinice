<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1B5E86">
<title>Cazuri Clinice 🩺</title>
<style>
  :root{--bg:#0f1b24;--card:#16262f;--card2:#1c313c;--ink:#e8f0f4;--mut:#9fb3bf;--acc:#3fb6c9;--acc2:#1B5E86;--line:#284350;--gold:#f0c674;}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1b24,#132530);color:var(--ink);min-height:100vh;line-height:1.5}
  .wrap{max-width:680px;margin:0 auto;padding:26px 14px 50px}
  header{text-align:center;padding:16px 0 4px}
  header h1{margin:0;font-size:1.6rem;letter-spacing:.2px}
  header p{margin:5px 0 0;color:var(--mut);font-size:.88rem}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 4px}
  .mtile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 12px;text-align:center;
    font-weight:600;font-size:.95rem;opacity:.85}
  .mtile .em{font-size:1.7rem;display:block;margin-bottom:4px}
  .mtile small{display:block;color:var(--mut);font-weight:400;font-size:.72rem;margin-top:3px}
  .mtile.wide{grid-column:1/3;background:linear-gradient(135deg,var(--acc2),#134b66)}
  .gate{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:14px;
    text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.3);max-width:400px;margin-left:auto;margin-right:auto}
  .gate .lock{font-size:1.7rem}
  .gate h2{margin:6px 0 2px;font-size:1.15rem}
  .gate p{margin:0 0 14px;color:var(--mut);font-size:.83rem}
  .row{display:flex;gap:10px;max-width:360px;margin:0 auto}
  input{flex:1;min-width:0;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink);font-size:1rem;text-align:center;letter-spacing:1px}
  input:focus{outline:none;border-color:var(--acc)}
  button{border:none;border-radius:12px;padding:13px 20px;background:var(--acc);color:#04222a;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap}
  button:hover{filter:brightness(1.08)}
  .err{color:#e78a86;font-size:.82rem;margin-top:12px;min-height:1em}
  .foot{text-align:center;color:#5f7480;font-size:.72rem;margin-top:18px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🩺 Cazuri Clinice</h1>
      <p>Antrenament pentru examenul practic — Denisa, FMV 2026</p>
    </header>
    <div class="grid" aria-hidden="true">
      <div class="mtile"><span class="em">🐾</span>Repro<small>29 cazuri</small></div>
      <div class="mtile"><span class="em">🪱</span>Paraziți<small>22 cazuri</small></div>
      <div class="mtile"><span class="em">🦠</span>Infecțioase<small>30 cazuri</small></div>
      <div class="mtile"><span class="em">🔪</span>Chirurgie<small>24 cazuri</small></div>
      <div class="mtile wide"><span class="em">🩺</span>Medicală<small>39 cazuri</small></div>
    </div>
    <div class="gate">
      <div class="lock">🔒</div>
      <h2>Acces privat</h2>
      <p>Introdu parola ca să începi antrenamentul</p>
      <form id="f">
        <div class="row">
          <input id="pw" type="password" placeholder="Parola" autocomplete="current-password" autofocus>
          <button type="submit">Intră</button>
        </div>
      </form>
      <div class="err" id="err"></div>
    </div>
    <div class="foot">144 de cazuri • 5 materii • doar pentru tine 🩺</div>

function b642bytes(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
async function unlock(pw){
  const raw=b642bytes(BLOB);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return new TextDecoder().decode(plain);
}
document.getElementById("f").addEventListener("submit",async function(e){
  e.preventDefault();
  const err=document.getElementById("err"); err.textContent="";
  const pw=document.getElementById("pw").value;
  try{
    const html=await unlock(pw);
    try{ sessionStorage.setItem("cc_pw", pw); }catch(_){}
    document.open(); document.write(html); document.close();
  }catch(ex){ err.textContent="Parolă greșită. Mai încearcă."; }
});
(async function(){
  try{ var s=sessionStorage.getItem("cc_pw"); if(s){ var html=await unlock(s); document.open();document.write(html);document.close(); } }catch(_){}
})();
