<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#1B5E86">
<title>Cazuri Clinice 🩺</title>
<style>
  :root{--bg:#0e1a22;--card:#172a35;--card2:#1e3543;--ink:#eaf2f6;--mut:#93a9b6;--acc:#43c1d4;--acc-d:#2b95a8;--line:#294452;--good:#3ac281;--gold:#f4cf76;
    --repro:#e879a9;--paraziti:#f0a44e;--infectioase:#57c98a;--chirurgie:#f0716b;--medicala:#43c1d4;}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);min-height:100vh;line-height:1.55;
    background:radial-gradient(1100px 520px at 15% -10%, rgba(67,193,212,.14), transparent 60%),radial-gradient(900px 500px at 100% 0%, rgba(232,121,169,.10), transparent 55%),linear-gradient(165deg,#0e1a22,#0c1720 60%,#0e1a22);background-attachment:fixed}
  .wrap{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px 16px}
  header{text-align:center;padding:12px 0 4px}
  .logo{display:inline-flex;align-items:center;gap:9px;font-size:1.5rem;font-weight:800}
  .logo .dot{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:1.05rem;background:linear-gradient(135deg,var(--acc),var(--acc-d));box-shadow:0 6px 18px rgba(67,193,212,.35)}
  header p{margin:6px 0 0;color:var(--mut);font-size:.86rem}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 4px}
  .mtile{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:16px 12px 13px;text-align:center;font-weight:700}
  .mtile::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--tc,var(--acc))}
  .mtile .em{font-size:1.8rem;display:block;margin-bottom:5px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
  .mtile small{display:block;color:var(--mut);font-weight:500;font-size:.72rem;margin-top:4px}
  .mtile.wide{grid-column:1/3;background:linear-gradient(120deg,#123a4c,#16506a);--tc:var(--gold)}
  .gate{background:linear-gradient(180deg,var(--card),#152833);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:14px;text-align:center;box-shadow:0 12px 34px rgba(0,0,0,.34);max-width:410px;margin-left:auto;margin-right:auto}
  .gate .lock{font-size:1.8rem}
  .gate h2{margin:6px 0 2px;font-size:1.18rem}
  .gate p{margin:0 0 14px;color:var(--mut);font-size:.83rem}
  .row{display:flex;gap:10px;max-width:370px;margin:0 auto}
  input{flex:1;min-width:0;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:1rem;text-align:center;letter-spacing:1px}
  input:focus{outline:none;border-color:var(--acc)}
  button{border:none;border-radius:12px;padding:13px 22px;background:linear-gradient(135deg,var(--acc),var(--acc-d));color:#052229;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 8px 20px rgba(67,193,212,.28)}
  button:hover{filter:brightness(1.06)}
  .err{color:#e78a86;font-size:.82rem;margin-top:12px;min-height:1em}
  .foot{text-align:center;color:#5f7480;font-size:.72rem;margin-top:18px}
</style>
</head>

    <header>

          <button type="submit">Intră</button>
        </div>
      </form>
      <div class="err" id="err"></div>
    </div>

function b642bytes(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
async function unlock(pw){
  const raw=b642bytes(BLOB);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return new TextDecoder().decode(plain);
}
