<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1B5E86">
<title>Cazuri Clinice 🔒</title>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body{background:linear-gradient(160deg,#0f1b24,#132530);color:#e8f0f4;display:flex;align-items:center;justify-content:center}
  .card{background:#16262f;border:1px solid #284350;border-radius:20px;padding:30px 26px;max-width:340px;width:88%;
    text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .lock{font-size:2.6rem;margin-bottom:6px}
  h1{font-size:1.25rem;margin:0 0 4px}
  p{color:#9fb3bf;font-size:.86rem;margin:0 0 18px}
  input{width:100%;box-sizing:border-box;padding:13px 14px;border-radius:12px;border:1px solid #284350;
    background:#0f1b24;color:#e8f0f4;font-size:1rem;text-align:center;letter-spacing:1px}
  input:focus{outline:none;border-color:#3fb6c9}
  button{margin-top:12px;width:100%;padding:13px;border:none;border-radius:12px;background:#3fb6c9;color:#04222a;
    font-size:1rem;font-weight:700;cursor:pointer}
  button:hover{filter:brightness(1.08)}
  .err{color:#e78a86;font-size:.82rem;margin-top:12px;min-height:1em}
  .foot{color:#5f7480;font-size:.7rem;margin-top:16px}
</style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>Cazuri Clinice</h1>
    <p>Antrenament examen practic — acces privat</p>
    <form id="f">
      <input id="pw" type="password" placeholder="Parola" autocomplete="current-password" autofocus>
      <button type="submit">Intră</button>
    </form>
    <div class="err" id="err"></div>
    <div class="foot">Doar pentru Denisa 🩺</div>
  </div>

function b642bytes(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
async function unlock(pw){
  const raw=b642bytes(BLOB);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
  return new TextDecoder().decode(plain);
}
document.getElementById("f").addEventListener("submit",async function(e){
  e.preventDefault();
  const err=document.getElementById("err"); err.textContent="";
  const pw=document.getElementById("pw").value;
  try{
    const html=await unlock(pw);
    try{ sessionStorage.setItem("cc_pw", pw); }catch(_){}
    document.open(); document.write(html); document.close();
  }catch(ex){ err.textContent="Parolă greșită. Mai încearcă."; }
});
// auto-unlock in aceeași sesiune (nu retastezi cât ții tab-ul deschis)
(async function(){
  try{ var s=sessionStorage.getItem("cc_pw"); if(s){ var html=await unlock(s); document.open();document.write(html);document.close(); } }catch(_){}
})();
